services:
  web:
    build: .
    container_name: web
    hostname: web
    restart: always
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - static_files:/app/staticfiles
      - media_files:/app/media
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/admin/login/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - main_network

  database:
    image: postgres:16-alpine
    container_name: database
    hostname: local_database
    restart: always
    env_file:
      - .env
    ports:
      - "6655:5432"
    volumes:
      - postgres_datastorage:/var/lib/postgresql/data
    networks:
      - main_network

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - main_network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5


volumes:
  static_files:
    driver: local
  media_files:
    driver: local
  postgres_datastorage:
    driver: local
  redis_data:
    driver: local

networks:
  main_network:
    driver: bridge